name: Update rain.js from Codeberg

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-rain-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Clone Codeberg repo
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git clone https://raincord:${CODEBERG_TOKEN}@codeberg.org/raincord/rain-private.git codeberg-src


      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies and build rain.js
        run: |
          cd codeberg-src
          bun install
          bun run build
          cd ..

      - name: Copy rain.js to public/
        run: |
          cp codeberg-src/dist/rain.js public/rain.js

      - name: Commit and push changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/rain.js
          git commit -m "Update rain.js from Codeberg" || echo "No changes to commit"
          git push https://x-access-token:${GH_PAT}@github.com/LampDelivery/lamp.delivery.git HEAD:main