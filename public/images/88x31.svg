<svg xmlns="http://www.w3.org/2000/svg" width="88" height="31" viewBox="0 0 88 31">
  <!-- outer border -->
  <rect width="88" height="31" fill="#000" />

  <!-- bevel top-left -->
  <rect x="1" y="1" width="86" height="1" fill="#5540a0" />
  <rect x="1" y="1" width="1" height="29" fill="#5540a0" />

  <!-- bevel bottom-right -->
  <rect x="1" y="29" width="86" height="1" fill="#050515" />
  <rect x="87" y="1" width="1" height="29" fill="#050515" />

  <!-- night sky -->
  <rect x="2" y="2" width="84" height="27" fill="#0a0a28" />

  <!-- subtle glow at bottom -->
  <ellipse cx="44" cy="30" rx="42" ry="6" fill="#1a1050" opacity="0.4" />

  <!-- moon -->
  <circle cx="74" cy="8" r="5" fill="#fff8e0" />
  <circle cx="76.5" cy="7" r="4.5" fill="#0a0a28" />

  <!-- stars -->
  <circle cx="12" cy="4" r="0.8" fill="#fff" opacity="0.9" />
  <circle cx="28" cy="3" r="0.6" fill="#fff" opacity="0.7" />
  <circle cx="45" cy="3" r="0.5" fill="#fff" opacity="0.5" />
  <circle cx="60" cy="4" r="0.7" fill="#fff" opacity="0.8" />
  <circle cx="68" cy="5" r="0.4" fill="#fff" opacity="0.5" />
  <circle cx="38" cy="6" r="0.5" fill="#fff" opacity="0.6" />
  <circle cx="20" cy="8" r="0.6" fill="#fff" opacity="0.7" />
  <circle cx="82" cy="14" r="0.5" fill="#fff" opacity="0.5" />
  <circle cx="32" cy="10" r="0.4" fill="#fff" opacity="0.4" />
  <circle cx="55" cy="12" r="0.5" fill="#fff" opacity="0.5" />
  <circle cx="70" cy="15" r="0.6" fill="#fff" opacity="0.7" />
  <circle cx="8" cy="14" r="0.5" fill="#fff" opacity="0.5" />
  <circle cx="50" cy="17" r="0.7" fill="#fff" opacity="0.8" />
  <circle cx="16" cy="19" r="0.5" fill="#fff" opacity="0.6" />
  <circle cx="36" cy="18" r="0.4" fill="#fff" opacity="0.4" />
  <circle cx="65" cy="20" r="0.5" fill="#fff" opacity="0.6" />
  <circle cx="78" cy="22" r="0.6" fill="#fff" opacity="0.7" />
  <circle cx="24" cy="23" r="0.5" fill="#fff" opacity="0.5" />
  <circle cx="44" cy="24" r="0.4" fill="#fff" opacity="0.5" />
  <circle cx="60" cy="26" r="0.5" fill="#fff" opacity="0.6" />

  <!-- twinkling stars (slightly larger) -->
  <circle cx="15" cy="14" r="1" fill="#fff" opacity="0.4" />
  <circle cx="15" cy="14" r="0.5" fill="#fff" opacity="0.9" />
  <circle cx="64" cy="14" r="1" fill="#fff" opacity="0.3" />
  <circle cx="64" cy="14" r="0.5" fill="#fff" opacity="0.8" />

  <!-- lightbulb icon -->
  <g transform="translate(3, 6)">
    <!-- glow -->
    <circle cx="9" cy="8" r="10" fill="#fff8e0" opacity="0.07" />
    <!-- glass bulb -->
    <path d="M4 5 C4 -1, 14 -1, 14 5 C14 9, 11 10, 11 12 L7 12 C7 10, 4 9, 4 5Z" fill="#fff8e0" opacity="0.85" />
    <path d="M5 5 C5 0, 13 0, 13 5 C13 8, 10 10, 10 11 L8 11 C8 10, 5 8, 5 5Z" fill="#ffc234" />
    <!-- glass highlight -->
    <path d="M6 2 C6 1, 9 0, 11 2" stroke="#fff" stroke-width="0.6" fill="none" opacity="0.5" />
    <!-- filament -->
    <path d="M7 8 L7 6 M7 6 L9 6 L9 8" stroke="#fff8e0" stroke-width="0.5" fill="none" opacity="0.8" />
    <path d="M7 8 L9 8" stroke="#fff8e0" stroke-width="0.5" opacity="0.5" />
    <!-- filament support wires -->
    <line x1="7" y1="6" x2="7" y2="5" stroke="#666" stroke-width="0.4" />
    <line x1="9" y1="6" x2="9" y2="5" stroke="#666" stroke-width="0.4" />
    <!-- screw base -->
    <rect x="6.5" y="12" width="5" height="2" rx="0.5" fill="#808080" />
    <rect x="6" y="14" width="6" height="1" rx="0.3" fill="#666" />
    <rect x="6.5" y="15" width="5" height="1" rx="0.3" fill="#555" />
    <!-- contact point -->
    <circle cx="9" cy="16" r="0.8" fill="#444" />
  </g>

  <!-- text: lamp. delivery :3 -->
  <text x="23" y="11" font-family="Arial Black, Helvetica Black, system-ui, sans-serif" font-size="7" font-weight="900" fill="#ffffff" letter-spacing="0.5">lamp.</text>
  <text x="23" y="19" font-family="Arial Black, Helvetica Black, system-ui, sans-serif" font-size="7" font-weight="900" fill="#d0bcff" letter-spacing="0.5">delivery</text>

  <!-- :3 -->
  <text x="23" y="27" font-family="system-ui, sans-serif" font-size="7" font-weight="800" fill="#ffb0d0" opacity="0.95">:3</text>
</svg>
